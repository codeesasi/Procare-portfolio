<div class="slide-content">
    <div class="content-left">
        <span class="tag">Get In Touch</span>
        <h2 class="title">Let's Start Your <span>Recovery.</span></h2>
        <div class="contact-info">
            <div class="info-row">
                <button class="direction-btn pulse" onclick="openMapModal()" title="Get Directions">
                    <i class="fa-solid fa-location-arrow"></i>
                </button>
                <div>
                    <strong>Location</strong>
                    <p>No 32, Gandhima Nagar Road, Gowthamapuri, Peelmedu</p>
                    <small>Near Aravanikkum Anbu illam, Coimbatore, Tamil Nadu 641004</small>
                </div>
            </div>
            <div class="info-row">
                <i class="fa-solid fa-phone"></i>
                <div>
                    <strong>Phone</strong>
                    <p>+91 98943 21019</p>
                </div>
            </div>
            <div class="info-row">
                <i class="fa-solid fa-envelope"></i>
                <div>
                    <strong>Email</strong>
                    <p>contact@procareprc.com</p>
                </div>
            </div>
        </div>
    </div>
    <div class="content-right">
        <div class="form-card">
            <h3>Book Appointment</h3>
            <form id="contactForm">
                <input type="text" placeholder="Your Name" required>
                <input type="tel" placeholder="Phone Number" required>
                <textarea placeholder="Describe your condition..." rows="3"></textarea>
                <button type="submit" class="btn-primary full">Submit Booking</button>
            </form>
        </div>
    </div>
</div>
